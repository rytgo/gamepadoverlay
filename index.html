<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamepad Overlay - DS4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="controller" class="controller ds4">
    <canvas id="trail-canvas" width="806" height="598"></canvas>

    <div class="triggers">
      <div id="trigger-left" class="trigger left"></div>
      <div id="trigger-right" class="trigger right"></div>
    </div>

    <div class="bumpers">
      <div id="bumper-left" class="bumper left"></div>
      <div id="bumper-right" class="bumper right"></div>
    </div>

    <div class="arrows">
      <div id="back" class="back"></div>
      <div id="start" class="start"></div>
    </div>

    <div class="abxy">
      <div id="btn-y" class="button y"></div>
      <div id="btn-b" class="button b"></div>
      <div id="btn-a" class="button a"></div>
      <div id="btn-x" class="button x"></div>
    </div>

    <div class="dpad">
      <div id="dpad-up" class="face up"></div>
      <div id="dpad-down" class="face down"></div>
      <div id="dpad-left" class="face left"></div>
      <div id="dpad-right" class="face right"></div>
    </div>

  </div>

<script>
const controller = document.getElementById('controller');
const trailCanvas = document.getElementById('trail-canvas');
const trailCtx = trailCanvas.getContext('2d');

const el = {
  triggerLeft: document.getElementById('trigger-left'),
  triggerRight: document.getElementById('trigger-right'),
  bumperLeft: document.getElementById('bumper-left'),
  bumperRight: document.getElementById('bumper-right'),
  back: document.getElementById('back'),
  start: document.getElementById('start'),
  btnA: document.getElementById('btn-a'),
  btnB: document.getElementById('btn-b'),
  btnX: document.getElementById('btn-x'),
  btnY: document.getElementById('btn-y'),
  dpadUp: document.getElementById('dpad-up'),
  dpadDown: document.getElementById('dpad-down'),
  dpadLeft: document.getElementById('dpad-left'),
  dpadRight: document.getElementById('dpad-right')
};

const BASE_W = 806;
const BASE_H = 598;
const STICK_RADIUS = 42;
const DEAD_ZONE = 0.0;
const MAX_TRAIL = 30;
const SMOOTH_FACTOR = 1.0;
const trails = [[], []];
let smoothAxes = [[0, 0], [0, 0]];

const LEFT_STICK_CENTER = { x: 275, y: 355 };
const RIGHT_STICK_CENTER = { x: 531, y: 355 };

function resizeOverlay() {
  const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H) * 0.9;
  controller.style.setProperty('--pad-scale', scale.toString());

  const dpr = window.devicePixelRatio || 1;
  trailCanvas.width = Math.round(BASE_W * dpr);
  trailCanvas.height = Math.round(BASE_H * dpr);
  trailCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function getGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (const pad of pads) if (pad) return pad;
  return null;
}

function deadzone(v) {
  if (Math.abs(v) < DEAD_ZONE) return 0;
  const sign = v > 0 ? 1 : -1;
  return sign * (Math.abs(v) - DEAD_ZONE) / (1 - DEAD_ZONE);
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function setPressed(node, pressed) {
  node.classList.toggle('pressed', !!pressed);
}

function drawStickLine(stick, dx, dy, trail) {
  const mag = Math.sqrt(dx * dx + dy * dy);

  if (trail.length > 3) {
    for (let i = 2; i < trail.length; i++) {
      const t = i / trail.length;
      const alpha = t * t * 0.5;
      const width = t * 4.4;

      const p0 = trail[i - 2];
      const p1 = trail[i - 1];
      const p2 = trail[i];

      const mx1 = (p0[0] + p1[0]) / 2;
      const my1 = (p0[1] + p1[1]) / 2;
      const mx2 = (p1[0] + p2[0]) / 2;
      const my2 = (p1[1] + p2[1]) / 2;

      const x1 = stick.x + mx1 * STICK_RADIUS;
      const y1 = stick.y + my1 * STICK_RADIUS;
      const x2 = stick.x + p1[0] * STICK_RADIUS;
      const y2 = stick.y + p1[1] * STICK_RADIUS;
      const x3 = stick.x + mx2 * STICK_RADIUS;
      const y3 = stick.y + my2 * STICK_RADIUS;

      trailCtx.beginPath();
      trailCtx.moveTo(x1, y1);
      trailCtx.quadraticCurveTo(x2, y2, x3, y3);
      trailCtx.strokeStyle = `rgba(255,130,190,${alpha})`;
      trailCtx.lineWidth = width;
      trailCtx.lineCap = 'round';
      trailCtx.lineJoin = 'round';
      trailCtx.stroke();
    }
  }

  if (mag > 0.001) {
    const px = stick.x + dx * STICK_RADIUS;
    const py = stick.y + dy * STICK_RADIUS;

    trailCtx.beginPath();
    trailCtx.moveTo(stick.x, stick.y);
    trailCtx.lineTo(px, py);
    trailCtx.strokeStyle = 'rgba(255, 100, 170, 0.45)';
    trailCtx.lineWidth = 7.5;
    trailCtx.lineCap = 'round';
    trailCtx.shadowColor = 'rgba(255, 80, 160, 0.4)';
    trailCtx.shadowBlur = 14;
    trailCtx.stroke();

    trailCtx.beginPath();
    trailCtx.moveTo(stick.x, stick.y);
    trailCtx.lineTo(px, py);
    trailCtx.strokeStyle = 'rgba(255, 190, 225, 0.92)';
    trailCtx.lineWidth = 2.75;
    trailCtx.lineCap = 'round';
    trailCtx.shadowColor = 'transparent';
    trailCtx.stroke();

    trailCtx.beginPath();
    trailCtx.arc(px, py, 5, 0, Math.PI * 2);
    trailCtx.fillStyle = 'rgba(255, 210, 235, 0.88)';
    trailCtx.shadowColor = 'rgba(255, 120, 180, 0.5)';
    trailCtx.shadowBlur = 8;
    trailCtx.fill();
    trailCtx.shadowColor = 'transparent';
    trailCtx.shadowBlur = 0;
  }
}

function render() {
  const gp = getGamepad();
  let rawAxes = [[0, 0], [0, 0]];
  let buttons = [];
  let triggers = [0, 0];

  if (gp) {
    rawAxes[0] = [deadzone(gp.axes[0] || 0), deadzone(gp.axes[1] || 0)];
    rawAxes[1] = [deadzone(gp.axes[2] || 0), deadzone(gp.axes[3] || 0)];
    buttons = gp.buttons;
    triggers = [
      gp.buttons[6] ? gp.buttons[6].value : 0,
      gp.buttons[7] ? gp.buttons[7].value : 0
    ];
  } else {
    const t = Date.now() / 1000;
    rawAxes[0] = [
      Math.sin(t * 0.7) * Math.cos(t * 0.3) * 0.82,
      Math.cos(t * 0.9) * Math.sin(t * 0.5) * 0.72
    ];
    rawAxes[1] = [
      Math.cos(t * 0.55) * Math.sin(t * 1.05) * 0.78,
      Math.sin(t * 0.75) * Math.cos(t * 0.38) * 0.85
    ];
    triggers = [
      Math.max(0, Math.sin(t * 0.5) * 0.5),
      Math.max(0, Math.cos(t * 0.7) * 0.5)
    ];
  }

  for (let i = 0; i < 2; i++) {
    smoothAxes[i][0] = lerp(smoothAxes[i][0], rawAxes[i][0], SMOOTH_FACTOR);
    smoothAxes[i][1] = lerp(smoothAxes[i][1], rawAxes[i][1], SMOOTH_FACTOR);
  }

  trails.forEach((trail, i) => {
    trail.push([smoothAxes[i][0], smoothAxes[i][1]]);
    if (trail.length > MAX_TRAIL) trail.shift();
  });

  const b = idx => (buttons[idx] ? buttons[idx].pressed : false);
  setPressed(el.bumperLeft, b(4));
  setPressed(el.bumperRight, b(5));
  setPressed(el.back, b(8));
  setPressed(el.start, b(9));
  setPressed(el.btnA, b(0));
  setPressed(el.btnB, b(1));
  setPressed(el.btnX, b(2));
  setPressed(el.btnY, b(3));
  setPressed(el.dpadUp, b(12));
  setPressed(el.dpadDown, b(13));
  setPressed(el.dpadLeft, b(14));
  setPressed(el.dpadRight, b(15));
  el.triggerLeft.style.opacity = Math.max(0, Math.min(1, triggers[0]));
  el.triggerRight.style.opacity = Math.max(0, Math.min(1, triggers[1]));

  trailCtx.clearRect(0, 0, BASE_W, BASE_H);
  drawStickLine(LEFT_STICK_CENTER, smoothAxes[0][0], smoothAxes[0][1], trails[0]);
  drawStickLine(RIGHT_STICK_CENTER, smoothAxes[1][0], smoothAxes[1][1], trails[1]);

  requestAnimationFrame(render);
}

window.addEventListener('resize', resizeOverlay);
window.addEventListener('gamepadconnected', () => {});
resizeOverlay();
render();
</script>
</body>
</html>
